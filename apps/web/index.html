<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" data-homepage-favicon="true" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" data-homepage-favicon="true" />
    <title>仪表盘</title>
    <script>
      (function () {
        try {
          var KEY = "homepage-theme";
          var raw = localStorage.getItem(KEY);
          var mode =
            raw === "light" || raw === "dark" || raw === "system"
              ? raw
              : "system";
          var prefersDark =
            typeof window.matchMedia === "function" &&
            window.matchMedia("(prefers-color-scheme: dark)").matches;
          var resolved =
            mode === "dark" || (mode === "system" && prefersDark)
              ? "dark"
              : "light";
          var root = document.documentElement;
          if (resolved === "dark") {
            root.classList.add("dark");
          } else {
            root.classList.remove("dark");
          }
        } catch (_) {
          /* localStorage / matchMedia 不可用时保持默认亮色，不阻断首屏 */
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
